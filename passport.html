<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOFU Passport</title>

  <link rel="stylesheet" href="assets/css/design-system.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 20px;
      text-align: center;
    }

    .stamp {
      font-size: 40px;
      opacity: 0.2;
      transition: 0.2s;
    }

    .stamp.active {
      opacity: 1;
      transform: scale(1.1);
    }

    .secret-wrap {
      margin-top: 20px;
      text-align: center;
    }

    .secret {
      font-size: 50px;
      opacity: 0.2;
      transition: 0.3s;
    }

    .secret.open {
      opacity: 1;
      transform: scale(1.2);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1 class="title">MOFU Passport</h1>
    <p class="subtitle" id="userName"></p>

    <div class="grid" id="stampGrid"></div>

    <div class="secret-wrap">
      <div class="secret" id="secret">❓</div>
      <div class="subtitle">シークレット（6つ集めると解放）</div>
    </div>

  </div>

</div>

<script type="module">
import { db } from "./firebase/config.js";
import {
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("mofu_user"));
const nickname = user?.nickname;

const animals = ["🐶","🐰","🐻","🦊","🦁","🐑"];

const grid = document.getElementById("stampGrid");
const secret = document.getElementById("secret");
const userName = document.getElementById("userName");

let stamps = [];

userName.textContent = nickname ? ${nickname} さん : "";

/* グリッド生成 */
function createGrid() {
  grid.innerHTML = "";

  const labels = ["いぬ","うさぎ","くま","きつね","ライオン","ひつじ"];

  labels.forEach((label, i) => {
    const el = document.createElement("div");
    el.innerHTML = `
      <div class="stamp" id="s${i}">${animals[i]}</div>
      <div style="font-size:12px;">${label}</div>
    `;
    grid.appendChild(el);
  });
}

/* リアルタイム監視 */
function listen() {
  const ref = doc(db, "users", nickname);

  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;

    stamps = snap.data().stamps || [];
    render();
  });
}

/* 描画 */
function render() {
  let count = 0;

  stamps.forEach((v, i) => {
    const el = document.getElementById("s" + i);
    if (!el) return;

    if (v === 1) {
      el.classList.add("active");
      count++;
    } else {
      el.classList.remove("active");
    }
  });

  /* シークレット解放条件 */
  if (count >= 6) {
    secret.textContent = "✨";
    secret.classList.add("open");
  } else {
    secret.textContent = "❓";
    secret.classList.remove("open");
  }
}

createGrid();
listen();

</script>

</body>
</html>
