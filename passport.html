<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOFU Passport</title>

  <link rel="stylesheet" href="assets/css/design-system.css">
</head>

<body>

<div class="container">
  <div class="card" id="card">

    <h1 class="title">MOFU Passport</h1>
    <p class="subtitle" id="userName">---</p>

    <div class="grid" id="stampGrid"></div>

    <div class="progress-wrap">
      <p id="progressText">0 / 7</p>
      <div class="bar">
        <div id="bar"></div>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { db } from "./firebase/config.js";
import {
  doc,
  onSnapshot,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("mofu_user"));
const nickname = user?.nickname;

const grid = document.getElementById("stampGrid");
const userName = document.getElementById("userName");
const progressText = document.getElementById("progressText");
const bar = document.getElementById("bar");
const card = document.getElementById("card");

let stamps = [];

// 表示
if (nickname) {
  userName.textContent = `${nickname} さん`;
}

// グリッド生成（1回だけ）
function createGrid() {
  grid.innerHTML = "";

  for (let i = 0; i < 7; i++) {
    const el = document.createElement("div");
    el.className = "stamp";
    el.textContent = i === 6 ? "⭐" : "🍴";

    grid.appendChild(el);
  }
}

// リアルタイム監視（ここが核心）
function listenStamps() {
  const ref = doc(db, "users", nickname);

  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;

    stamps = snap.data().stamps || [];
    render();
  });
}

// 描画
function render() {
  const items = document.querySelectorAll(".stamp");

  let count = 0;

  items.forEach((el, i) => {
    if (stamps[i] === 1) {
      el.classList.add("active");
      count++;
    } else {
      el.classList.remove("active");
    }
  });

  progressText.textContent = `${count} / 7`;
  bar.style.width = `${(count / 7) * 100}%`;

  if (count === 7) {
    showComplete();
  }
}

// 完了演出
function showComplete() {
  if (document.querySelector(".complete")) return;

  card.innerHTML = `
    <div class="complete">
      <h1>🎉 COMPLETE</h1>
      <p>MOFU Passport達成！</p>
      <div style="font-size:50px;">🐾✨</div>
    </div>
  `;
}

// 初期化
createGrid();
listenStamps();

</script>

</body>
</html>
