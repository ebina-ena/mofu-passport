<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOFU Staff Panel</title>

  <link rel="stylesheet" href="assets/css/design-system.css">

  <style>
    .wrap { max-width: 520px; margin: 40px auto; }

    .row {
      display:flex;
      gap:10px;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap:10px;
      margin-top:20px;
    }

    .stamp-btn {
      padding:10px;
      border-radius:12px;
      border:1px solid #ddd;
      background:white;
      cursor:pointer;
      text-align:center;
    }

    .stamp-btn.active {
      background:#AEE6D8;
    }

    input {
      flex:1;
      padding:12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="container wrap">

  <div class="card">

    <h1 class="title">Staff Panel</h1>

    <div class="row">
      <input id="name" placeholder="ニックネーム">
      <button class="btn-primary" onclick="searchUser()">検索</button>
    </div>

    <div id="result"></div>

  </div>

</div>

<script type="module">
import { db } from "./firebase/config.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const labels = ["いぬ","うさぎ","くま","きつね","ライオン","ひつじ","シークレット"];

let currentUser = null;
let selectedIndex = 0;

/* 検索 */
async function searchUser() {
  const name = document.getElementById("name").value.trim();
  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.getElementById("result").innerHTML = "見つかりません";
    return;
  }

  currentUser = name;
  const data = snap.data();

  document.getElementById("result").innerHTML = `
    <div>
      <p>👤 ${data.nickname}</p>

      <div class="grid" id="stampSelect"></div>

      <button class="btn-primary" onclick="giveStamp()">付与</button>
    </div>
  `;

  renderSelect();
}

/* スタンプ選択UI */
function renderSelect() {
  const grid = document.getElementById("stampSelect");
  grid.innerHTML = "";

  labels.forEach((label,i) => {
    const div = document.createElement("div");
    div.className = "stamp-btn";
    div.textContent = label;

    div.onclick = () => {
      selectedIndex = i;
      document.querySelectorAll(".stamp-btn").forEach(e=>e.classList.remove("active"));
      div.classList.add("active");
    };

    grid.appendChild(div);
  });
}

/* 付与 */
async function giveStamp() {
  if (!currentUser) return;

  const ref = doc(db,"users",currentUser);
  const snap = await getDoc(ref);

  const data = snap.data();
  const stamps = data.stamps || [];

  if (selectedIndex === 6) {
    if (stamps.filter(v=>v===1).length < 6) {
      alert("まだシークレット不可");
      return;
    }
  }

  stamps[selectedIndex] = 1;

  await updateDoc(ref,{ stamps });

  alert("付与完了");
  searchUser();
}

window.searchUser = searchUser;
window.giveStamp = giveStamp;

</script>

</body>
</html>
