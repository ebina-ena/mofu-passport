<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOFU Staff Panel</title>

  <link rel="stylesheet" href="assets/css/design-system.css">

  <style>
    .wrap {
      max-width: 520px;
      margin: 40px auto;
    }

    /* 横並び崩れ防止 */
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* 入力：主役 */
    .row input {
      flex: 1;
      min-width: 0;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      outline: none;
    }

    /* ボタン：固定サイズ（重要） */
    .row button {
      flex: 0 0 auto;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
    }

    /* ユーザーカード */
    .user-card {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fff;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    /* スタンプボタンだけ強調 */
    .btn-primary {
      background: #AEE6D8;
      color: #1a1a1a;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="container wrap">

  <div class="card">

    <h1 class="title">Staff Panel</h1>
    <p class="subtitle">スタンプ付与管理</p>

    <div class="row">
      <input id="name" placeholder="ニックネームを入力">
      <button class="btn-primary" onclick="searchUser()">検索</button>
    </div>

    <div id="result" class="small"></div>

  </div>

</div>

<script type="module">
import { db } from "./firebase/config.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

let currentUser = null;

/* =========================
   検索
========================= */
async function searchUser() {
  const name = document.getElementById("name").value.trim();
  console.log("検索:", name);

  const result = document.getElementById("result");

  if (!name) {
    result.innerHTML = "ニックネームを入力してください";
    return;
  }

  try {
    const ref = doc(db, "users", name);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      result.innerHTML = "ユーザーが見つかりません";
      currentUser = null;
      return;
    }

    const data = snap.data();
    currentUser = name;

    const count = (data.stamps || []).filter(v => v === 1).length;

    result.innerHTML = `
      <div class="user-card">
        <div>👤 ${data.nickname}</div>
        <div>スタンプ: ${count} / 7</div>
        <button class="btn-primary" onclick="giveStamp()">スタンプ付与</button>
      </div>
    `;

  } catch (e) {
    console.error(e);
    result.innerHTML = "エラーが発生しました";
  }
}

/* =========================
   スタンプ付与
========================= */
async function giveStamp() {
  if (!currentUser) return;

  const ref = doc(db, "users", currentUser);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const data = snap.data();
  const stamps = data.stamps || [];

  const index = stamps.findIndex(v => v === 0);

  if (index === -1) {
    alert("すでにコンプリート済みです");
    return;
  }

  stamps[index] = 1;

  await updateDoc(ref, { stamps });

  alert("スタンプ付与しました！");

  searchUser();
}

/* =========================
   グローバル公開
========================= */
window.searchUser = searchUser;
window.giveStamp = giveStamp;

</script>

</body>
</html>
